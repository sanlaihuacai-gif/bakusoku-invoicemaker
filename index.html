<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆速！書類メーカー Pro Max</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <div id="input-section">
            <header>
                <h1>爆速！書類メーカー Pro</h1>
                <p class="subtitle">インボイス制度・源泉徴収・電子印影対応</p>
                <div class="merit-badges">
                    <span class="merit-badge">🚀 ログイン不要</span>
                    <span class="merit-badge">⚡️ 爆速PDF出力</span>
                    <span class="merit-badge">💾 データ自動保存</span>
                </div>
                <div class="pr-badge">【PR】</div>
            </header>

            <div class="ad-section">
                <div class="ad-pc ad-banner-full">
                    <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSJ+4784FM+3SPO+C8LMIP" rel="nofollow" target="_blank">
                    <img border="0" width="468" height="60" alt="" src="https://www28.a8.net/svt/bgt?aid=260322067254&wid=001&eno=01&mid=s00000017718074004000&mc=1"></a>
                    <img border="0" width="1" height="1" src="https://www16.a8.net/0.gif?a8mat=4AZLSJ+4784FM+3SPO+C8LMIP" alt="">
                </div>
                <div class="ad-sp ad-banner-full">
                    <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSJ+4784FM+3SPO+C8LMIP" rel="nofollow" target="_blank">
                    <img border="0" width="468" height="60" alt="" src="https://www28.a8.net/svt/bgt?aid=260322067254&wid=001&eno=01&mid=s00000017718074004000&mc=1"></a>
                    <img border="0" width="1" height="1" src="https://www16.a8.net/0.gif?a8mat=4AZLSJ+4784FM+3SPO+C8LMIP" alt="">
                </div>
            </div>

            <div class="section-title">データ管理（ブラウザ保存）</div>
            <div class="form-group" style="background:#f9fbfd; padding:15px; border-radius:8px; border:1px solid #d0e0f0; margin-bottom:20px;">
                <div style="margin-bottom:15px;">
                    <label style="font-size:12px; font-weight:bold; color:#007aff; display:block; margin-bottom:5px;">■ テンプレート機能</label>
                    <p style="font-size:10px; color:#666; margin-bottom:8px;">よく使う取引先やフォーマットを保存・呼び出しできます。</p>
                    <div class="form-row" style="margin-bottom:8px;">
                        <button class="secondary-btn" onclick="saveTemplate()" style="flex:1; margin:0; background:#fff; border-color:#007aff; color:#007aff;">現在の内容を保存</button>
                    </div>
                    <div class="form-row">
                        <select id="templateSelect" style="flex:2; padding:10px;"></select>
                        <button class="secondary-btn" onclick="loadTemplate()" style="flex:1; margin:0;">読込</button>
                        <button class="secondary-btn" onclick="deleteTemplate()" style="flex:0.5; margin:0; color:#ff3b30;">削除</button>
                    </div>
                </div>
                <div style="border-top:1px dashed #ccc; padding-top:15px;">
                    <label style="font-size:12px; font-weight:bold; color:#007aff; display:block; margin-bottom:5px;">■ 過去の作成履歴（自動記録：直近20件）</label>
                    <p style="font-size:10px; color:#666; margin-bottom:8px;">過去に生成した書類から内容を複製できます。</p>
                    <div class="form-row">
                        <select id="historySelect" style="flex:2.5; padding:10px;"></select>
                        <button class="secondary-btn" onclick="loadHistory()" style="flex:1; margin:0;">複製</button>
                        <button class="secondary-btn" onclick="deleteHistory()" style="flex:0.5; margin:0; color:#ff3b30;">削除</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>作成する書類</label>
                <div class="tab-container">
                    <input type="radio" name="docType" value="見積書" id="type1" checked onclick="updateUI()">
                    <label for="type1" class="tab-item">見積書</label>
                    <input type="radio" name="docType" value="納品書" id="type2" onclick="updateUI()">
                    <label for="type2" class="tab-item">納品書</label>
                    <input type="radio" name="docType" value="請求書" id="type3" onclick="updateUI()">
                    <label for="type3" class="tab-item">請求書</label>
                    <div class="tab-bg"></div>
                </div>
            </div>

            <div class="section-title">基本設定</div>
            <div class="form-row">
                <div class="form-group" style="flex:1.2;">
                    <label>書類番号</label>
                    <input type="text" id="docNumber" name="docNumber" placeholder="No.2026-001" oninput="updatePreview()">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>発行日</label>
                    <input type="date" id="issueDate" name="issueDate" max="9999-12-31" oninput="updatePreview()">
                </div>
                <div class="form-group" style="flex:1;">
                    <label id="expiryLabel">有効期限</label>
                    <input type="date" id="expiryDate" name="expiryDate" max="9999-12-31" oninput="updatePreview()">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex:1;">
                    <label>ロゴ画像</label>
                    <input type="file" accept="image/*" name="logoFile" onchange="handleFile(this, 'logo')">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>印影・判子</label>
                    <input type="file" accept="image/*" name="sealFile" onchange="handleFile(this, 'seal')">
                </div>
            </div>

            <div class="ad-section">
                <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSI+5VCWJ6+50+2I1T8Y" rel="nofollow" target="_blank" class="ad-btn-text">お名前.comで独自ドメインを取得する</a>
                <img border="0" width="1" height="1" src="https://www14.a8.net/0.gif?a8mat=4AZLSI+5VCWJ6+50+2I1T8Y" alt="">
            </div>

            <div class="section-title">宛先・件名</div>
            <div class="form-group">
                <label>取引先名 <span class="required">必須</span></label>
                <input type="text" id="clientName" name="clientName" placeholder="〇〇株式会社 御中" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>件名</label>
                <input type="text" id="subject" name="subject" placeholder="案件名を入力" oninput="updatePreview()">
            </div>

            <div class="section-title">明細内容</div>
            <div id="items-container"></div>
            <button class="secondary-btn" onclick="addItemRow()">+ 行を追加</button>

            <div class="section-title">発行者（あなた）の情報</div>
            <div class="form-group">
                <label>氏名または屋号 <span class="required">必須</span></label>
                <input type="text" id="issuerName" name="issuerName" placeholder="山田 太郎" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>住所</label>
                <input type="text" id="issuerAddress" name="issuerAddress" placeholder="東京都〇〇区〇〇" oninput="updatePreview()">
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:1;">
                    <label>電話番号</label>
                    <input type="text" id="issuerTel" name="issuerTel" placeholder="090-0000-0000" oninput="handleTelInput(this)">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>登録番号</label>
                    <div class="t-input-group">
                        <span class="t-prefix">T</span>
                        <input type="text" id="invoiceId" name="invoiceId" placeholder="13桁" maxlength="13" oninput="handleNumberInput(this)">
                    </div>
                </div>
            </div>

            <div id="bank-info-area" style="display: none;">
                <div class="section-title">お振込先</div>
                <div class="form-row">
                    <input type="text" id="bankName" name="bankName" placeholder="〇〇銀行" list="bank-list" style="flex:1.2;" oninput="updatePreview()">
                    <datalist id="bank-list">
                        <option value="三菱UFJ銀行"><option value="三井住友銀行"><option value="みずほ銀行"><option value="楽天銀行"><option value="PayPay銀行">
                    </datalist>
                    <div style="flex:1; display:flex;">
                        <input type="text" id="branchName" name="branchName" placeholder="〇〇" oninput="updatePreview()" style="flex:1; border-radius:8px 0 0 8px;">
                        <span style="padding:0 10px; background:#eee; border:1px solid var(--border); border-left:none; border-radius:0 8px 8px 0; display:flex; align-items:center; font-size:14px; color:#555;">支店</span>
                    </div>
                </div>
                <div class="form-row">
                    <select id="accountType" name="accountType" style="flex:1;" onchange="updatePreview()">
                        <option value="普通">普通</option><option value="当座">当座</option>
                    </select>
                    <input type="text" id="accountNumber" name="accountNumber" placeholder="口座番号(7桁)" maxlength="7" style="flex:2;" oninput="handleNumberInput(this)">
                </div>
                <input type="text" id="accountHolder" name="accountHolder" placeholder="口座名義 (カタカナ)" style="margin-top:10px;" onblur="handleHolderConvert(this); updatePreview()">
            </div>

            <div class="section-title">その他設定</div>
            <div class="form-group withholding-box">
                <label class="checkbox-wrapper" style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="withholding" name="withholding" onchange="updatePreview()" style="width:auto; margin-right:8px;">
                    <span class="checkbox-text">源泉徴収（10.21%）を含める</span>
                </label>
            </div>
            <div class="form-group">
                <label>備考</label>
                <textarea id="remarks" name="remarks" rows="3" placeholder="今月も大変お世話になりました。"></textarea>
            </div>
            <div class="form-group">
                <label>通貨</label>
                <select id="currency" name="currency" onchange="updatePreview()">
                    <option value="JPY">日本円 (¥)</option><option value="USD">USドル ($)</option><option value="EUR">ユーロ (€)</option>
                </select>
            </div>

            <button class="primary-btn" onclick="handleExport()">PDFを生成して保存（待機10秒）</button>

            <div class="affiliate-card">
                <p class="ad-tag-small">PR: フリーランスの節税対策</p>
                <div class="ad-pc ad-banner-rect" style="margin-top:10px;">
                    <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSJ+47TK1E+35XE+65EOH" rel="nofollow" target="_blank">
                    <img border="0" width="300" height="250" alt="" src="https://www28.a8.net/svt/bgt?aid=260322067255&wid=001&eno=01&mid=s00000014765001033000&mc=1"></a>
                    <img border="0" width="1" height="1" src="https://www12.a8.net/0.gif?a8mat=4AZLSJ+47TK1E+35XE+65EOH" alt="">
                </div>
                <div class="ad-sp ad-banner-rect" style="margin-top:10px;">
                    <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSJ+47TK1E+35XE+65EOH" rel="nofollow" target="_blank">
                    <img border="0" width="300" height="250" alt="" src="https://www28.a8.net/svt/bgt?aid=260322067255&wid=001&eno=01&mid=s00000014765001033000&mc=1"></a>
                    <img border="0" width="1" height="1" src="https://www12.a8.net/0.gif?a8mat=4AZLSJ+47TK1E+35XE+65EOH" alt="">
                </div>
            </div>
        </div>

        <div id="preview-section">
            <div id="preview-wrapper">
                <div id="pdf-content"></div>
            </div>
        </div>

        <div id="ad-overlay">
            <div class="ad-modal">
                <div class="ad-content">
                    <h3>高品質なPDFを出力中...</h3>
                    <div class="loader-container"><div class="loader-bar"></div></div>
                    <div id="timer">10</div>
                    <div class="featured-ad-box" style="margin-top:20px;">
                        <p class="featured-text" style="font-size:12px; color:#666; margin-bottom:10px;">待ち時間におすすめ</p>
                        
                        <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSI+5TKLPU+0K+10YDIP" rel="nofollow" target="_blank">
                        <img border="0" width="300" height="250" alt="" src="https://www23.a8.net/svt/bgt?aid=260322066352&wid=001&eno=01&mid=s00000000002006207000&mc=1" class="modal-ad-img"></a>
                        <img border="0" width="1" height="1" src="https://www14.a8.net/0.gif?a8mat=4AZLSI+5TKLPU+0K+10YDIP" alt="">
                        <br>
                        <a href="https://px.a8.net/svt/ejp?a8mat=4AZLSI+5TKLPU+0K+10YDIP" target="_blank" class="cta-button">【PR】おすすめのサービスをチェック</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
